### model
model_name_or_path: /root/autodl-tmp/helmet_llm/models/Qwen2.5-VL-3B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### dataset
dataset: shwd_helmet_train
eval_dataset: shwd_helmet_val
dataset_dir: /root/autodl-tmp/helmet_llm/data
template: qwen2_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: /root/autodl-tmp/helmet_llm/output/qwen25vl_shwd_lora_full
logging_steps: 20
save_steps: 300
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

### eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 300



